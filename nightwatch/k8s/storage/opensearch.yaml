---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-config
  namespace: nightwatch
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/part-of: nightwatch-platform
data:
  opensearch.yml: |
    cluster.name: nightwatch-opensearch
    node.name: ${HOSTNAME}
    network.host: 0.0.0.0
    http.port: 9200
    transport.port: 9300

    # Single-node mode for Phase 1 (no cluster formation)
    discovery.type: single-node

    # Security (basic, disable for dev)
    plugins.security.disabled: false
    plugins.security.ssl.http.enabled: false
    plugins.security.ssl.transport.enabled: true
    plugins.security.ssl.transport.pemcert_filepath: node.pem
    plugins.security.ssl.transport.pemkey_filepath: node-key.pem
    plugins.security.ssl.transport.pemtrustedcas_filepath: root-ca.pem
    plugins.security.allow_default_init_securityindex: true
    plugins.security.authcz.admin_dn:
      - "CN=admin,O=NIGHTWATCH"
    plugins.security.nodes_dn:
      - "CN=node,O=NIGHTWATCH"

    # Index settings
    indices.memory.index_buffer_size: 20%
    indices.queries.cache.size: 10%

    # Thread pool
    thread_pool.write.queue_size: 1000
    thread_pool.search.queue_size: 1000

    # Disk allocation
    cluster.routing.allocation.disk.threshold_enabled: true
    cluster.routing.allocation.disk.watermark.low: 85%
    cluster.routing.allocation.disk.watermark.high: 90%
    cluster.routing.allocation.disk.watermark.flood_stage: 95%

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  namespace: nightwatch
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/part-of: nightwatch-platform
    app: opensearch
spec:
  serviceName: opensearch
  replicas: 1
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
        app.kubernetes.io/name: opensearch
        app.kubernetes.io/part-of: nightwatch-platform
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true
      initContainers:
        - name: init-sysctl
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              sysctl -w vm.max_map_count=262144
              chown -R 1000:1000 /usr/share/opensearch/data
          securityContext:
            privileged: true
            runAsUser: 0
          volumeMounts:
            - name: opensearch-data
              mountPath: /usr/share/opensearch/data
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.13.0
          env:
            - name: cluster.name
              value: "nightwatch-opensearch"
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: discovery.type
              value: "single-node"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms2g -Xmx2g"
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: password
            # Disable security for dev (enable in production)
            - name: DISABLE_SECURITY_PLUGIN
              value: "true"
            - name: bootstrap.memory_lock
              value: "true"
          ports:
            - name: http
              containerPort: 9200
              protocol: TCP
            - name: transport
              containerPort: 9300
              protocol: TCP
          volumeMounts:
            - name: opensearch-data
              mountPath: /usr/share/opensearch/data
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /_cluster/health?wait_for_status=yellow&timeout=5s
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 10
            timeoutSeconds: 10
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
                - SYS_RESOURCE
  volumeClaimTemplates:
    - metadata:
        name: opensearch-data
        labels:
          app.kubernetes.io/part-of: nightwatch-platform
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Gi

---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: nightwatch
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/part-of: nightwatch-platform
    app: opensearch
spec:
  selector:
    app: opensearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
      protocol: TCP
    - name: transport
      port: 9300
      targetPort: 9300
      protocol: TCP
  type: ClusterIP

---
# OpenSearch Dashboards (Kibana-compatible UI)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch-dashboards
  namespace: nightwatch
  labels:
    app.kubernetes.io/name: opensearch-dashboards
    app.kubernetes.io/part-of: nightwatch-platform
    app: opensearch-dashboards
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch-dashboards
  template:
    metadata:
      labels:
        app: opensearch-dashboards
        app.kubernetes.io/name: opensearch-dashboards
        app.kubernetes.io/part-of: nightwatch-platform
    spec:
      containers:
        - name: opensearch-dashboards
          image: opensearchproject/opensearch-dashboards:2.13.0
          env:
            - name: OPENSEARCH_HOSTS
              value: '["http://opensearch:9200"]'
            - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
              value: "true"
          ports:
            - name: http
              containerPort: 5601
              protocol: TCP
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-dashboards
  namespace: nightwatch
  labels:
    app.kubernetes.io/name: opensearch-dashboards
    app.kubernetes.io/part-of: nightwatch-platform
spec:
  selector:
    app: opensearch-dashboards
  ports:
    - name: http
      port: 5601
      targetPort: 5601
      protocol: TCP
  type: ClusterIP
