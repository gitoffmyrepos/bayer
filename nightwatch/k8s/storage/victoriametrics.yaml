---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: victoriametrics-data
  namespace: nightwatch
  labels:
    app.kubernetes.io/name: victoriametrics
    app.kubernetes.io/part-of: nightwatch-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoriametrics
  namespace: nightwatch
  labels:
    app.kubernetes.io/name: victoriametrics
    app.kubernetes.io/part-of: nightwatch-platform
    app: victoriametrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoriametrics
  strategy:
    type: Recreate  # Required because of RWO PVC
  template:
    metadata:
      labels:
        app: victoriametrics
        app.kubernetes.io/name: victoriametrics
        app.kubernetes.io/part-of: nightwatch-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8428"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true
      initContainers:
        - name: init-chown-data
          image: busybox:1.36
          command: ["chown", "-R", "1000:1000", "/victoria-metrics-data"]
          volumeMounts:
            - name: victoriametrics-data
              mountPath: /victoria-metrics-data
          securityContext:
            runAsUser: 0
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:v1.99.0
          args:
            - "-storageDataPath=/victoria-metrics-data"
            - "-retentionPeriod=90d"
            - "-httpListenAddr=:8428"
            - "-maxLabelsPerTimeseries=30"
            - "-loggerLevel=INFO"
            - "-loggerFormat=json"
            - "-search.maxQueryDuration=60s"
            - "-search.maxConcurrentRequests=16"
            - "-search.maxSamplesPerQuery=50000000"
            - "-dedup.minScrapeInterval=30s"
          ports:
            - name: http
              containerPort: 8428
              protocol: TCP
          volumeMounts:
            - name: victoriametrics-data
              mountPath: /victoria-metrics-data
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: victoriametrics-data
          persistentVolumeClaim:
            claimName: victoriametrics-data

---
apiVersion: v1
kind: Service
metadata:
  name: victoriametrics
  namespace: nightwatch
  labels:
    app.kubernetes.io/name: victoriametrics
    app.kubernetes.io/part-of: nightwatch-platform
    app: victoriametrics
  annotations:
    # Prometheus URL for Grafana datasource
    grafana.datasource.url: "http://victoriametrics.nightwatch.svc.cluster.local:8428"
spec:
  selector:
    app: victoriametrics
  ports:
    - name: http
      port: 8428
      targetPort: 8428
      protocol: TCP
  type: ClusterIP
