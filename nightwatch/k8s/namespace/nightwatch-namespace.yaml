---
apiVersion: v1
kind: Namespace
metadata:
  name: nightwatch
  labels:
    app.kubernetes.io/name: nightwatch
    app.kubernetes.io/part-of: nightwatch-platform
    environment: production
    team: platform-engineering
    project: bayer-modeln-monitoring

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: nightwatch-resource-quota
  namespace: nightwatch
spec:
  hard:
    requests.cpu: "16"
    requests.memory: "32Gi"
    limits.cpu: "32"
    limits.memory: "64Gi"
    persistentvolumeclaims: "20"
    pods: "50"
    services: "20"
    configmaps: "50"
    secrets: "50"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: nightwatch-limit-range
  namespace: nightwatch
spec:
  limits:
  - type: Container
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    max:
      cpu: "8"
      memory: "16Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
  - type: Pod
    max:
      cpu: "16"
      memory: "32Gi"
  - type: PersistentVolumeClaim
    max:
      storage: "200Gi"
    min:
      storage: "1Gi"
