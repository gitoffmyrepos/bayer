# ============================================================================
# Nightwatch Master Configuration — ForexTrader Test Deployment
# ============================================================================
nightwatch:
  check_interval_seconds: 60
  max_incidents_history: 100
  enable_ai_diagnosis: true
  alert_severities:
    - critical
    - high

# ─── LLM Provider ─────────────────────────────────────────────────────────────
llm:
  provider: anthropic
  model: claude-haiku-4-5
  api_key: ${ANTHROPIC_API_KEY}
  max_tokens: 1024
  temperature: 0.1
  timeout_seconds: 30

# ─── Application Adapters ─────────────────────────────────────────────────────
adapters:
  - name: forextrader
    type: forextrader
    config_file: forextrader/config.yaml
    enabled: true

# ─── Alerting ─────────────────────────────────────────────────────────────────
alerting:
  dedup_window_seconds: 300
  discord:
    webhook_url: ${DISCORD_WEBHOOK_URL}

# ─── Auto-Healing ─────────────────────────────────────────────────────────────
healing:
  mode: suggest_only
  dry_run: true
  allowed_actions:
    - k8s_restart_pod
    - k8s_scale_up

# ─── API ──────────────────────────────────────────────────────────────────────
api:
  host: 0.0.0.0
  port: 8080
