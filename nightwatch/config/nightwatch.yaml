# ============================================================================
# Nightwatch Master Configuration — ForexTrader Test Deployment
# ============================================================================
nightwatch:
  check_interval_seconds: 60
  max_incidents_history: 100
  enable_ai_diagnosis: true
  alert_severities:
    - critical
    - high

# ─── LLM Provider ─────────────────────────────────────────────────────────────
llm:
  provider: anthropic
  model: claude-haiku-4-20250514
  api_key: ${ANTHROPIC_API_KEY}
  max_tokens: 1024
  temperature: 0.1
  timeout_seconds: 30

# ─── Application Adapters ─────────────────────────────────────────────────────
adapters:
  - name: forextrader
    type: forextrader
    config_file: forextrader/config.yaml
    enabled: true

# ─── Alerting ─────────────────────────────────────────────────────────────────
alerting:
  dedup_window_seconds: 300
  discord:
    webhook_url: ${DISCORD_WEBHOOK_URL}
    enabled: true  # Active
    # Nova bot user ID — Nightwatch will @-mention her on critical/high
    # alerts so OpenClaw fires a real mention event (not just embed).
    mention_user_id: "1469399996540653714"   # nova-msg bot user
    # The Bot API mention is sent ALSO via DISCORD_BOT_TOKEN+DISCORD_CHANNEL_ID
    # env vars (set in k8s deployment from nightwatch-discord secret).
  telegram:
    webhook_url: http://localhost:8765/alert

# ─── Repos (for GitOps auto-remediation) ─────────────────────────────────────
repos:
  fx:
    path: ${FX_REPO_PATH:/repos/fx}
    access: read  # Application code — read only for analysis
  gitops:
    path: ${GITOPS_REPO_PATH:/repos/sb-gitops}
    access: readwrite  # K8s manifests — auto-fix and push
    branch: master
  infra:
    path: ${INFRA_REPO_PATH:/repos/sb-dev-infra}
    access: readwrite  # Ansible/Terraform — auto-fix and push
    branch: master

# ─── Auto-Healing (GitOps Remediation) ────────────────────────────────────────
healing:
  mode: auto_remediate
  dry_run: false
  escalation_channel: discord
  nova_mention_id: "1319042937081593857"
  allowed_actions:
    - k8s_restart_pod
    - k8s_scale_up
    - gitops_fix_memory
    - gitops_fix_probe
    - gitops_fix_image
    - gitops_fix_resources
    - code_analyze_and_recommend
  # LLM for remediation — MiniMax-M2.7 (Anthropic-compat endpoint).
  # Strong reasoning model for actual code fixes & GitOps remediation.
  # Monitoring still uses the primary `llm` block above (Anthropic Haiku) for cheap triage.
  remediation_llm:
    provider: anthropic
    model: "MiniMax-M2.7"
    api_key: ${MINIMAX_API_KEY}
    base_url: https://api.minimax.io/anthropic
    timeout_seconds: 120
    max_tokens: 4096

# ─── API ──────────────────────────────────────────────────────────────────────
api:
  host: 0.0.0.0
  port: 8080
